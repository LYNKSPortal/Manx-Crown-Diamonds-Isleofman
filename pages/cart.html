    <link rel="stylesheet" href="../css/style.css">
    <style>
        .cart-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 40px;
            min-height: 60vh;
        }

        .cart-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 60px;
        }

        .cart-items-list {
            background: white;
        }

        .cart-item {
            display: grid;
            grid-template-columns: 120px 1fr auto;
            gap: 30px;
            padding: 30px 0;
            border-bottom: 1px solid rgba(201, 169, 97, 0.1);
        }

        .cart-item-image {
            width: 120px;
            height: 120px;
            background: var(--cream);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
        }

        .cart-item-info h3 {
            font-size: 22px;
            margin-bottom: 8px;
            font-weight: 300;
        }

        .cart-item-price {
            color: var(--primary-gold);
            font-size: 20px;
            margin-bottom: 15px;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .quantity-btn {
            width: 35px;
            height: 35px;
            border: 1px solid rgba(201, 169, 97, 0.3);
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .quantity-btn:hover {
            background: var(--cream);
            border-color: var(--primary-gold);
        }

        .cart-item-remove {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            text-decoration: underline;
            font-size: 13px;
            margin-top: 10px;
        }

        .cart-summary {
            background: var(--cream);
            padding: 40px;
            height: fit-content;
            position: sticky;
            top: 140px;
        }

        .cart-summary h2 {
            font-size: 28px;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .summary-total {
            padding-top: 20px;
            border-top: 2px solid rgba(201, 169, 97, 0.3);
            margin-top: 20px;
        }

        .summary-total-amount {
            font-size: 36px;
            color: var(--primary-gold);
            font-family: 'Cormorant Garamond', serif;
        }

        .empty-cart-message {
            text-align: center;
            padding: 100px 40px;
        }

        .empty-cart-message h2 {
            font-size: 36px;
            margin-bottom: 20px;
            color: var(--text-muted);
        }

        @media (max-width: 968px) {
            .cart-grid {
                grid-template-columns: 1fr;
            }

            .cart-item {
                grid-template-columns: 80px 1fr;
                gap: 20px;
            }

            .cart-item-image {
                width: 80px;
                height: 80px;
                font-size: 35px;
            }
        }
    
        footer { background: #0A0A0A; color: white; padding: 60px 40px 30px; text-align: center !important; }
        footer a { color: #C9A961; text-decoration: none; }
        footer a:hover { text-decoration: underline; }
        </style>
</head>
