<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="productTitle">Product - Manx Crown Diamonds</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .product-detail {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 40px;
        }

        .product-image-main {
            width: 100%;
            height: 600px;
            background: linear-gradient(135deg, #f5f5f5, #e0e0e0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 200px;
            border: 1px solid rgba(201, 169, 97, 0.1);
        }

        .product-details {
            padding: 40px 0;
        }

        .product-badge-large {
            display: inline-block;
            background: var(--primary-gold);
            color: white;
            padding: 8px 20px;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .product-name {
            font-size: 48px;
            margin-bottom: 15px;
            color: var(--dark-navy);
            font-weight: 300;
            letter-spacing: 1px;
        }

        .product-price-large {
            font-size: 42px;
            color: var(--primary-gold);
            margin-bottom: 30px;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
        }

        .product-description-full {
            font-size: 16px;
            line-height: 1.8;
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        .product-meta {
            margin: 30px 0;
            padding: 30px 0;
            border-top: 1px solid rgba(201, 169, 97, 0.1);
            border-bottom: 1px solid rgba(201, 169, 97, 0.1);
        }

        .meta-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 15px;
        }

        .meta-label {
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .meta-value {
            color: var(--dark-navy);
            font-weight: 500;
        }

        .product-actions-detail {
            display: flex;
            gap: 20px;
            margin-top: 40px;
        }

        .product-actions-detail .btn {
            flex: 1;
            text-align: center;
            padding: 20px;
            font-size: 14px;
        }

        @media (max-width: 968px) {
            .product-detail {
                grid-template-columns: 1fr;
                gap: 40px;
            }

            .product-name {
                font-size: 36px;
            }
        }
    
        footer { background: #0A0A0A; color: white; padding: 60px 40px 30px; text-align: center !important; }
        footer a { color: #C9A961; text-decoration: none; }
        footer a:hover { text-decoration: underline; }
        </style>
</head>
