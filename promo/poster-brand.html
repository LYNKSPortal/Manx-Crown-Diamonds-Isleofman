<!DOCTYPE html>
<html lang="en">
<head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-DT8J769N1L"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-DT8J769N1L');

 <meta charset="UTF-8">
 <meta name="format-detection" content="telephone=no">
 <meta name="viewport" content="width=1080">
 <title>MCD – Brand Poster (1080×1080)</title>
 <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
 <style>
 * { margin: 0; padding: 0; box-sizing: border-box; }
 html { background: #2B2D42; width: 1080px; height: 1080px; overflow: hidden; }
 body { width: 1080px; height: 1080px; overflow: hidden; background: #2B2D42; margin: 0; }

 .poster {
 width: 1080px;
 height: 1080px;
 position: relative;
 overflow: hidden;
 background: #2B2D42;
 display: flex;
 flex-direction: column;
 }

 /* Full bleed product photo — top 60% */
 .photo-wrap {
 position: relative;
 flex: 0 0 650px;
 overflow: hidden;
 }
 .photo-wrap img {
 width: 100%;
 height: 100%;
 object-fit: cover;
 object-position: center 30%;
 display: block;
 filter: brightness(0.78);
 }
 /* Gradient fade at bottom of photo into navy */
 .photo-wrap::after {
 content: '';
 position: absolute;
 inset: 0;
 background: linear-gradient(to bottom,
 rgba(43,45,66,0) 0%,
 rgba(43,45,66,0) 45%,
 rgba(43,45,66,0.6) 75%,
 rgba(43,45,66,1) 100%);
 }

 /* Logo watermark inside photo */
 .watermark {
 position: absolute;
 top: 50%; left: 50%;
 transform: translate(-50%, -50%);
 width: 85%;
 opacity: 0.12;
 pointer-events: none;
 filter: grayscale(1) invert(1);
 mix-blend-mode: screen;
 z-index: 1;
 }

 /* Thin gold top border line */
 .gold-line-top {
 position: absolute;
 top: 0; left: 0; right: 0;
 height: 4px;
 background: linear-gradient(90deg, transparent, #C9A961, transparent);
 z-index: 10;
 }

 /* Content block overlapping photo + lower section */
 .content {
 position: absolute;
 bottom: 0; left: 0; right: 0;
 padding: 0 70px 60px;
 z-index: 10;
 }

 .eyebrow {
 font-family: 'Montserrat', sans-serif;
 font-size: 12px;
 font-weight: 500;
 letter-spacing: 5px;
 text-transform: uppercase;
 color: #C9A961;
 margin-bottom: 18px;
 }

 .divider {
 display: flex;
 align-items: center;
 gap: 14px;
 margin-bottom: 22px;
 }
 .divider-line {
 flex: 1;
 height: 1px;
 background: linear-gradient(90deg, #C9A961, transparent);
 }
 .divider-diamond { color: #C9A961; font-size: 10px; }

 .brand-name {
 font-family: 'Cormorant Garamond', serif;
 font-size: 82px;
 font-weight: 300;
 line-height: 0.9;
 color: #F8F6F0;
 letter-spacing: 3px;
 margin-bottom: 20px;
 }
 .brand-name em {
 font-style: italic;
 color: #C9A961;
 }

 .tagline {
 font-family: 'Montserrat', sans-serif;
 font-size: 13px;
 font-weight: 300;
 letter-spacing: 4px;
 text-transform: uppercase;
 color: rgba(248,246,240,0.65);
 margin-bottom: 40px;
 }

 .footer-row {
 display: flex;
 justify-content: space-between;
 align-items: flex-end;
 border-top: 1px solid rgba(201,169,97,0.25);
 padding-top: 22px;
 }
 .footer-detail {
 font-family: 'Montserrat', sans-serif;
 font-size: 11px;
 letter-spacing: 2.5px;
 text-transform: uppercase;
 color: rgba(248,246,240,0.45);
 }
 .footer-url {
 font-family: 'Cormorant Garamond', serif;
 font-size: 16px;
 font-weight: 300;
 color: #C9A961;
 letter-spacing: 1px;
 }

 /* Thin gold bottom border */
 .gold-line-bottom {
 position: absolute;
 bottom: 0; left: 0; right: 0;
 height: 4px;
 background: linear-gradient(90deg, transparent, #C9A961, transparent);
 z-index: 10;
 }

 /* Side border lines */
 .gold-line-left,
 .gold-line-right {
 position: absolute;
 top: 0; bottom: 0;
 width: 4px;
 background: linear-gradient(180deg, transparent, #C9A961, transparent);
 z-index: 10;
 }
 .gold-line-left { left: 0; }
 .gold-line-right { right: 0; }
 </style>
</head>
<body>
<div class="poster">
 <div class="gold-line-top"></div>
 <div class="gold-line-left"></div>
 <div class="gold-line-right"></div>
 <div class="gold-line-bottom"></div>

 <div class="photo-wrap">
 <img src="../images/Oval-diamondmelee.JPG" alt="">
 <img src="../images/logo-mcd.jpg" alt="" class="watermark">
 </div>

 <div class="content">
 <p class="eyebrow">Isle of Man &nbsp;◆&nbsp; Est. 2024</p>
 <div class="divider">
 <div class="divider-line"></div>
 <span class="divider-diamond">◆</span>
 </div>
 <h1 class="brand-name">Manx Crown<br><em>Diamonds</em></h1>
 <p class="tagline">Handcrafted Fine Jewellery &nbsp;·&nbsp; IGI Certified Lab-Grown Diamonds</p>
 <div class="footer-row">
 <span class="footer-detail">Isle of Man &nbsp;|&nbsp; IGI &amp; GIA Certified</span>
 <span class="footer-url">manxcrowndiamonds.com</span>
 </div>
 </div>
</div>
</body>
</html>
