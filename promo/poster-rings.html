<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="format-detection" content="telephone=no">
 <meta name="viewport" content="width=1080">
 <title>MCD – Rings Collection Poster (1080×1350 Portrait)</title>
 <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
 <style>
 * { margin: 0; padding: 0; box-sizing: border-box; }
 html { background: #0A0A0A; width: 1080px; height: 1350px; overflow: hidden; }
 body { width: 1080px; height: 1350px; overflow: hidden; background: #0A0A0A; margin: 0; }

 .poster {
 width: 1080px;
 height: 1350px;
 position: relative;
 overflow: hidden;
 background: #F8F6F0;
 }

 /* Left half — dark panel */
 .panel-dark {
 position: absolute;
 left: 0; top: 0; bottom: 0;
 width: 480px;
 background: linear-gradient(160deg, #0A0A0A 0%, #2B2D42 100%);
 z-index: 1;
 }

 /* Right half — product photo */
 .panel-photo {
 position: absolute;
 right: 0; top: 0; bottom: 0;
 width: 620px;
 overflow: hidden;
 }
 .panel-photo img {
 width: 100%;
 height: 100%;
 object-fit: cover;
 object-position: center center;
 filter: brightness(0.9) saturate(1.05);
 }
 /* Fade left edge of photo into dark panel */
 .panel-photo::before {
 content: '';
 position: absolute;
 inset: 0;
 background: linear-gradient(90deg, #0A0A0A 0%, transparent 35%);
 z-index: 2;
 }

 /* Decorative frame inside dark panel */
 .frame {
 position: absolute;
 top: 40px; left: 30px;
 right: 30px; bottom: 40px;
 border: 1px solid rgba(201,169,97,0.2);
 z-index: 2;
 pointer-events: none;
 }
 .frame-corner {
 position: absolute;
 width: 20px; height: 20px;
 border-color: #C9A961;
 border-style: solid;
 }
 .frame-corner.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
 .frame-corner.tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
 .frame-corner.bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
 .frame-corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

 /* Watermark logo in dark panel */
 .watermark {
 position: absolute;
 bottom: 80px; left: -30px;
 width: 420px;
 opacity: 0.10;
 filter: grayscale(1) invert(1);
 mix-blend-mode: screen;
 z-index: 1;
 pointer-events: none;
 }

 /* Content sits inside dark panel */
 .content {
 position: absolute;
 left: 0; top: 0; bottom: 0;
 width: 480px;
 z-index: 5;
 display: flex;
 flex-direction: column;
 justify-content: center;
 padding: 80px 52px 80px 64px;
 }

 .eyebrow {
 font-family: 'Montserrat', sans-serif;
 font-size: 10.5px;
 font-weight: 500;
 letter-spacing: 5px;
 text-transform: uppercase;
 color: #C9A961;
 margin-bottom: 28px;
 }

 .title-small {
 font-family: 'Cormorant Garamond', serif;
 font-size: 18px;
 font-weight: 300;
 letter-spacing: 6px;
 text-transform: uppercase;
 color: rgba(248,246,240,0.55);
 margin-bottom: 10px;
 }

 .title-main {
 font-family: 'Cormorant Garamond', serif;
 font-size: 76px;
 font-weight: 300;
 line-height: 0.92;
 color: #F8F6F0;
 margin-bottom: 32px;
 }

 .gold-rule {
 width: 60px;
 height: 2px;
 background: #C9A961;
 margin-bottom: 32px;
 }

 .body-text {
 font-family: 'Montserrat', sans-serif;
 font-size: 12.5px;
 font-weight: 300;
 line-height: 1.9;
 color: rgba(248,246,240,0.6);
 margin-bottom: 42px;
 }

 .badge {
 display: inline-flex;
 align-items: center;
 gap: 10px;
 padding: 12px 20px;
 border: 1px solid rgba(201,169,97,0.35);
 margin-bottom: 12px;
 }
 .badge-icon { color: #C9A961; font-size: 14px; }
 .badge-text {
 font-family: 'Montserrat', sans-serif;
 font-size: 10px;
 font-weight: 500;
 letter-spacing: 2.5px;
 text-transform: uppercase;
 color: rgba(248,246,240,0.7);
 }

 .price-from {
 margin-top: 44px;
 padding-top: 28px;
 border-top: 1px solid rgba(201,169,97,0.2);
 }
 .price-label {
 font-family: 'Montserrat', sans-serif;
 font-size: 10px;
 letter-spacing: 3px;
 text-transform: uppercase;
 color: rgba(248,246,240,0.4);
 margin-bottom: 6px;
 }
 .price-value {
 font-family: 'Cormorant Garamond', serif;
 font-size: 48px;
 font-weight: 300;
 color: #C9A961;
 }

 .footer {
 position: absolute;
 bottom: 48px;
 left: 64px;
 right: 64px;
 z-index: 5;
 display: flex;
 justify-content: space-between;
 align-items: center;
 border-top: 1px solid rgba(201,169,97,0.15);
 padding-top: 18px;
 }
 .footer-left {
 font-family: 'Montserrat', sans-serif;
 font-size: 10px;
 letter-spacing: 2.5px;
 text-transform: uppercase;
 color: rgba(248,246,240,0.35);
 }
 .footer-right {
 font-family: 'Cormorant Garamond', serif;
 font-size: 15px;
 color: #C9A961;
 letter-spacing: 0.5px;
 }

 /* Gold borders */
 .gold-line { position: absolute; z-index: 10; }
 .gl-top { top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, transparent, #C9A961 50%, transparent); }
 .gl-bottom { bottom: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, transparent, #C9A961 50%, transparent); }
 </style>
</head>
<body>
<div class="poster">
 <div class="gold-line gl-top"></div>
 <div class="gold-line gl-bottom"></div>

 <div class="panel-dark">
 <div class="frame">
 <div class="frame-corner tl"></div>
 <div class="frame-corner tr"></div>
 <div class="frame-corner bl"></div>
 <div class="frame-corner br"></div>
 </div>
 <img src="../images/logo-mcd.jpg" alt="" class="watermark">
 </div>

 <div class="panel-photo">
 <img src="../images/ring-cushion.jpg" alt="Cushion Cut Solitaire">
 </div>

 <div class="content">
 <p class="eyebrow">◆ &nbsp; New Collection</p>
 <p class="title-small">The</p>
 <h1 class="title-main">Ring<br>Collection</h1>
 <div class="gold-rule"></div>
 <p class="body-text">
 Every ring is handcrafted to order<br>
 on the Isle of Man. IGI certified<br>
 lab-grown diamonds in your choice<br>
 of metal, carat and clarity grade.
 </p>

 <div class="badge">
 <span class="badge-icon">◆</span>
 <span class="badge-text">IGI Certified Lab-Grown Diamonds</span>
 </div>
 <div class="badge">
 <span class="badge-icon">◆</span>
 <span class="badge-text"></span>
 </div>

 <div class="price-from">
 <p class="price-label">Starting from</p>
 <p class="price-value">£895</p>
 </div>
 </div>

 <div class="footer">
 <span class="footer-left">Isle of Man &nbsp;|&nbsp; Est. 2024</span>
 <span class="footer-right">manxcrowndiamonds.com</span>
 </div>
</div>
</body>
</html>
